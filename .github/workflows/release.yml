name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            -p terminalos \
            -p terminalos-cli \
            -p terminalos-daemon

      - name: Package release archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          STAGING="terminalos-${VERSION}-${TARGET}"
          mkdir -p "${STAGING}"
          cp "target/${TARGET}/release/terminalos" "${STAGING}/"
          cp "target/${TARGET}/release/terminalos-cli" "${STAGING}/"
          cp "target/${TARGET}/release/terminalos-daemon" "${STAGING}/"
          cp README.md LICENSE "${STAGING}/" 2>/dev/null || true
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf "${STAGING}.tar.gz" "${STAGING}"
            echo "ARCHIVE=${STAGING}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminalos-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          generate_release_notes: true
